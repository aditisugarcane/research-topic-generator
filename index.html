<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go Research Something</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f3f1ea;
    --ink:#16150f;
    --accent:#1f2bd1;     /* one confident pop of cobalt */
    --faint:#a8a499;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:"Space Mono", monospace;
    display:flex; flex-direction:column;
    min-height:100vh;
    padding:28px;
    -webkit-font-smoothing:antialiased;
  }

  /* top bar */
  .bar{
    display:flex; justify-content:space-between; align-items:center;
    font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--faint);
  }
  .bar .mark{color:var(--ink); font-weight:700;}
  .bar .mark::before{content:"✱ "; color:var(--accent);}

  /* center stage */
  main{
    flex:1;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    gap:26px;
    padding:24px 0;
  }

  .serial{
    font-size:11px; letter-spacing:.3em; text-transform:uppercase; color:var(--faint);
    min-height:14px;
  }

  .topic{
    font-family:"Bricolage Grotesque", sans-serif;
    font-weight:800; font-optical-sizing:auto;
    font-size:clamp(40px, 11vw, 116px);
    line-height:.96; letter-spacing:-.02em;
    margin:0; max-width:14ch;
    text-wrap:balance; word-break:break-word;
    color:var(--ink); text-decoration:none;
    transition:color .15s;
    display:inline-block;
  }
  a.topic:hover{color:var(--accent);}
  .topic.placeholder{color:var(--faint); font-weight:500;}
  /* blinking caret while idle/loading */
  .caret{
    display:inline-block; width:.07em; height:.82em; vertical-align:-.06em;
    margin-left:.06em; background:var(--accent);
    animation:blink 1.05s steps(1) infinite;
  }
  @keyframes blink{50%{opacity:0;}}

  .research{
    font-size:12px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--accent); text-decoration:none;
    border-bottom:1px solid transparent; padding-bottom:2px;
    min-height:16px; opacity:0; transition:opacity .2s, border-color .15s;
  }
  .research.show{opacity:1;}
  .research:hover{border-color:var(--accent);}

  /* button */
  .go{
    font-family:"Space Mono", monospace; font-weight:700;
    font-size:15px; letter-spacing:.06em;
    color:var(--paper); background:var(--accent);
    border:none; cursor:pointer;
    padding:18px 40px; border-radius:2px;
    transition:transform .08s, box-shadow .12s, opacity .15s;
    box-shadow:0 4px 0 #141d8c;
  }
  .go:hover{transform:translateY(-1px); box-shadow:0 5px 0 #141d8c;}
  .go:active{transform:translateY(4px); box-shadow:0 0 0 #141d8c;}
  .go:disabled{opacity:.5; cursor:wait; transform:none; box-shadow:0 4px 0 #141d8c;}

  /* footer */
  footer{
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint);
    flex-wrap:wrap;
  }
  footer .trail{color:var(--faint); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:65vw;}
  footer .trail b{color:var(--ink); font-weight:400;}
  footer a{color:var(--faint); text-decoration:none; border-bottom:1px dotted var(--faint);}
  footer a:hover{color:var(--accent); border-color:var(--accent);}

  :focus-visible{outline:2px solid var(--accent); outline-offset:4px;}

  @media (max-width:560px){
    body{padding:20px;}
    .topic{font-size:clamp(34px,12.5vw,72px); max-width:11ch;}
    footer .trail{max-width:100%;}
  }
  @media (prefers-reduced-motion:reduce){
    .caret{animation:none;}
    .go{transition:none;}
  }
</style>
</head>
<body>
  <div class="bar">
    <span class="mark">Index Drawer</span>
    <span id="counter">000 pulled</span>
  </div>

  <main>
    <p class="serial" id="serial">Random research topic</p>
    <h1 class="topic placeholder" id="topic">press the button<span class="caret" id="caret"></span></h1>
    <a class="research" id="research" href="#" target="_blank" rel="noopener">Read about it ↗</a>
    <button class="go" id="go">Give me something</button>
  </main>

  <footer>
    <span class="trail" id="trail">&nbsp;</span>
    <span>Pulled from <a href="https://en.wikipedia.org" target="_blank" rel="noopener">Wikipedia</a>'s 7M+ articles</span>
  </footer>

<script>
const topicEl = document.getElementById('topic');
const caretEl = document.getElementById('caret');
const serialEl = document.getElementById('serial');
const researchEl = document.getElementById('research');
const counterEl = document.getElementById('counter');
const trailEl = document.getElementById('trail');
const goBtn = document.getElementById('go');

const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ#%&*/";
const randChar = () => CHARS[Math.floor(Math.random()*CHARS.length)];

let pulled = 0;
let history = [];
let busy = false;
let scramble = null;

/* Fallback list — genuinely interesting topics for when Wikipedia can't be reached. */
const FALLBACK = [
  "Quileute people","Sentinelese","Ainu people","Sámi people","Hadza people","Tuareg","Basque language","Romani people","Maroons",
  "Situs inversus totalis","Synesthesia","Phantom limb","Cotard delusion","Capgras delusion","Prosopagnosia","Aphantasia","Hyperthymesia","Fatal familial insomnia","Methemoglobinemia",
  "Epigenetics","Quantum entanglement","Bioluminescence","Sonoluminescence","Ball lightning","Brinicle","Superfluidity","Mycorrhizal network","CRISPR","Antimatter","Dark matter","Penrose tiling","Tabby's Star",
  "History of New Zealand","Bronze Age collapse","Tunguska event","Defenestration of Prague","Year Without a Summer","Toba catastrophe","Antikythera mechanism","Cahokia","Indus Valley Civilisation","Göbekli Tepe","Emu War","Republic of Cospaia","Kingdom of Sikkim",
  "Socotra","Point Nemo","Danakil Depression","Principality of Sealand","Aral Sea","Lake Baikal","Darvaza gas crater","Bir Tawil","North Sentinel Island",
  "Apophenia","Pareidolia","Sonder","Liminal space","Overton window","Survivorship bias","Streetlight effect","Dunbar's number","Sturgeon's law","Ship of Theseus",
  "Whistled language","Pirahã language","Toki Pona","Esperanto","Boustrophedon","Untranslatability","Click consonant","Logogram",
  "Voynich manuscript","Wow! signal","Tulip mania","Outsider art","Mojibake","Bayeux Tapestry","Wabi-sabi","Kintsugi","Codex Gigas","Numbers station",
  "Axolotl","Turritopsis dohrnii","Mantis shrimp","Pangolin","Olm","Platypus","Cuttlefish","Slime mold","Aye-aye","Tardigrade",
  "P versus NP problem","Halting problem","Gödel's incompleteness theorems","Collatz conjecture","Public-key cryptography","Zero-knowledge proof","Trolley problem","Cellular automaton","Game theory",
  "Mary Celeste","Dancing plague of 1518","Taos hum","Dyatlov Pass incident","Spontaneous human combustion","Phantom island","Oak Island"
];

/* keep results feeling like real topics */
function isGood(t){
  if(!t) return false;
  if(/^\d+$/.test(t)) return false;
  if(/^List of /i.test(t)) return false;
  if(/\(disambiguation\)/i.test(t)) return false;
  if(/^\d{4}[–-]\d/.test(t)) return false;   // date ranges like "1998–99 ..."
  return true;
}

async function fetchTopic(){
  const url = "https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*"
            + "&list=random&rnnamespace=0&rnlimit=10&rnfilterredir=nonredirects";
  const res = await fetch(url);
  const data = await res.json();
  const titles = (data.query.random || []).map(x => x.title).filter(isGood);
  if(!titles.length) throw new Error("no good titles");
  return titles[Math.floor(Math.random()*titles.length)];
}

function startScramble(){
  caretEl.style.display = "none";
  if(reduce){ topicEl.textContent = "…"; return; }
  let len = 7 + Math.floor(Math.random()*8);
  scramble = setInterval(() => {
    let s = "";
    for(let i=0;i<len;i++) s += randChar();
    topicEl.textContent = s;
  }, 55);
}

function reveal(text){
  return new Promise(resolve => {
    if(reduce){ topicEl.textContent = text; resolve(); return; }
    clearInterval(scramble);
    let frame = 0;
    const total = text.length;
    scramble = setInterval(() => {
      let out = "";
      for(let i=0;i<text.length;i++){
        if(i < frame) out += text[i];
        else if(text[i] === " ") out += " ";
        else out += randChar();
      }
      topicEl.textContent = out;
      frame += 0.55;
      if(frame >= total){
        clearInterval(scramble);
        topicEl.textContent = text;
        resolve();
      }
    }, 30);
  });
}

function setLink(title){
  const slug = encodeURIComponent(title.replace(/ /g, "_"));
  const url = "https://en.wikipedia.org/wiki/" + slug;
  topicEl.outerHTML = '<a class="topic" id="topic" href="'+url+'" target="_blank" rel="noopener"></a>';
  // re-grab the element (outerHTML replaced it)
  return document.getElementById('topic');
}

async function generate(){
  if(busy) return;
  busy = true;
  goBtn.disabled = true;
  researchEl.classList.remove('show');

  // make sure the topic is a plain heading during the animation
  const cur = document.getElementById('topic');
  cur.outerHTML = '<h1 class="topic" id="topic"></h1>';
  let el = document.getElementById('topic');

  serialEl.textContent = "Pulling a card…";
  startScramble();

  const minWait = new Promise(r => setTimeout(r, 420)); // let the animation breathe
  let title;
  try{
    const [t] = await Promise.all([fetchTopic(), minWait]);
    title = t;
  }catch(e){
    await minWait;
    title = FALLBACK[Math.floor(Math.random()*FALLBACK.length)];
  }

  await reveal(title);

  // turn the finished topic into a link to its article
  el = setLink(title);
  el.textContent = title;

  pulled++;
  counterEl.textContent = String(pulled).padStart(3,"0") + " pulled";
  serialEl.textContent = "No. " + String(Math.floor(Math.random()*9000)+1000);

  const slug = encodeURIComponent(title.replace(/ /g,"_"));
  researchEl.href = "https://en.wikipedia.org/wiki/" + slug;
  researchEl.classList.add('show');

  history.unshift(title);
  history = history.slice(0,4);
  if(history.length > 1){
    trailEl.innerHTML = "Just had: " + history.slice(1).map(h => "<b>"+h.replace(/</g,"&lt;")+"</b>").join(" · ");
  }

  busy = false;
  goBtn.disabled = false;
}

goBtn.addEventListener('click', generate);
document.addEventListener('keydown', (e) => {
  if((e.code === 'Enter' || e.code === 'Space') && document.activeElement !== researchEl){
    if(document.activeElement === goBtn && e.code === 'Space') return; // let button handle its own space
    e.preventDefault();
    generate();
  }
});
</script>
</body>
</html>
